<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SWEETPAIN</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
background:#000;
color:#fff;
font-family:Arial,Helvetica,sans-serif;
overflow-x:hidden;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

h1{
font-size:clamp(2.8rem,10vw,5rem);
letter-spacing:8px;
margin-bottom:20px;
}

.subtitle{
font-size:1.2rem;
color:#bdbdbd;
margin-bottom:40px;
}

button{
padding:16px 45px;
background:#fff;
color:#000;
border:none;
font-size:1rem;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

.collection{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:50px 25px;
text-align:center;
}

.collection h2{
font-size:2.5rem;
margin-bottom:15px;
letter-spacing:3px;
}

.collection h3{
font-size:1.3rem;
margin-bottom:30px;
color:#bdbdbd;
}

.mockup{
width:90%;
max-width:420px;
height:520px;
border:2px solid #fff;
display:flex;
align-items:center;
justify-content:center;
margin-bottom:40px;
color:#666;
font-size:1.2rem;
}

.description{
max-width:700px;
line-height:1.8;
font-size:1rem;
color:#ddd;
}

footer{
padding:50px 20px;
text-align:center;
border-top:1px solid #222;
color:#777;
}

</style>

</head>

<body>

<section class="hero">

<h1>SWEETPAIN</h1>

<p class="subtitle">
COLLECTION 001 — THE PANTHEON
</p>

<a href="#quetzal">
<button>
ENTER THE CLUB
</button>
</a>

</section>

<section id="quetzal" class="collection">

<h2>ARTIFACT I</h2>

<h3>QUETZAL</h3>

<div class="mockup">

AQUÍ IRÁ EL MOCKUP

</div>

<div class="description">

<p>

El primer Artifact representa el inicio del camino.

No habla de comodidad.

Habla de transformación.

Cada colección de SweetPain cuenta una historia.

Quetzal es el primer capítulo.

</p>

</div>

</section>

<footer>

© 2026 SWEETPAIN CLUB

</footer>

</body>
</html>
